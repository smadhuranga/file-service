server:
  port: 8083

spring:
  application:
    name: file-service
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    gcp:
      project-id: your-gcp-project-id
      storage:
      # Credentials are not needed if running locally after 'gcloud auth application-default login'
      # Or if deployed to GCP.
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

gcp:
  bucket:
    name: your-gcs-bucket-name

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"